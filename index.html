<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; form-action 'self'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Studio Manager</title>
  <meta name="description" content="Manage clients, projects, quotes, invoices, appointments, expenses and hours for your design studio.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#7c1f17">

  <!-- iOS install / home-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Studio">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <div id="app" class="app-loading">
    <div class="boot">
      <img src="./assets/icon.svg" alt="Studio Manager" width="64" height="64">
      <p>Loading your studio…</p>
    </div>
  </div>
  <div id="print-area" aria-hidden="true"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
